  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#F8FAFC; color:#1E293B; line-height:1.5; }
  
  .container { max-width:1400px; margin:0 auto; padding:24px; }

  /* Header */
  .header { text-align:center; padding:32px 0 16px; border-bottom:3px solid #E2E8F0; margin-bottom:32px; }

  .header .sub { font-size:14px; color:#64748B; margin-top:8px; }

  .legend { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-bottom:24px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; }
  .legend-dot { width:14px; height:14px; border-radius:4px; border:2px solid; }

  /* Category Nav */
  .cat-nav { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:28px; position:sticky; top:0; background:#F8FAFC; padding:12px 0; z-index:100; border-bottom:1px solid #E2E8F0; }
  .cat-btn { padding:8px 18px; border-radius:20px; border:2px solid #CBD5E1; background:white; cursor:pointer; font-size:14px; font-weight:600; color:#475569; transition:all .2s; }

  .cat-btn.active { color:white; border-color:transparent; }
  .cat-btn.active[data-cat="all"] { background:#334155; }
  .cat-btn.active[data-cat="ops"] { background:#4F46E5; }
  .cat-btn.active[data-cat="act"] { background:#D97706; }
  .cat-btn.active[data-cat="cmp"] { background:#059669; }
  .cat-btn.active[data-cat="fac"] { background:#DC2626; }
  .cat-btn.active[data-cat="sys"] { background:#7C3AED; }

  .month-section { margin-bottom:36px; }
  .month-header { 
    font-size:20px; font-weight:800; color:#0F172A; 
    padding:10px 0 6px; margin-bottom:12px;
    border-bottom:2px solid #CBD5E1;
    display:flex; align-items:center; gap:10px;
  }
  .month-header .badge { font-size:12px; font-weight:600; padding:2px 10px; border-radius:12px; background:#E2E8F0; color:#475569; }

  /* Calendar Grid */
  .cal-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(42px, 1fr)); gap:3px; margin-bottom:6px; }
  .day-header { font-size:11px; font-weight:700; text-align:center; color:#94A3B8; padding:4px 0; }
  .day-cell {
    min-height:42px; border-radius:6px; border:1.5px solid #E2E8F0; background:white;
    padding:3px; font-size:11px; position:relative; transition:all .2s; cursor:default;
  }
  .day-cell.has-event { border-width:2px; }
  .day-cell:hover { transform:scale(1.05); z-index:10; box-shadow:0 4px 12px rgba(0,0,0,.1); }
  .day-num { font-weight:700; font-size:11px; color:#475569; margin-bottom:1px; }
  .day-cell.weekend .day-num { color:#EF4444; }
  .day-cell.today { background:#F0F9FF; border-color:#0EA5E9; }
  .evt-tag { 
    display:inline-block; font-size:8.5px; padding:1px 3px; border-radius:3px; 
    margin-top:1px; line-height:1.3; color:white; font-weight:600; max-width:100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .day-cell.cat-ops { border-color:var(--ops-border); }
  .day-cell.cat-act { border-color:var(--act-border); }
  .day-cell.cat-cmp { border-color:var(--cmp-border); }
  .day-cell.cat-fac { border-color:var(--fac-border); }
  .day-cell.cat-sys { border-color:var(--sys-border); }
  .evt-ops { background:var(--ops-border); }
  .evt-act { background:var(--act-border); }
  .evt-cmp { background:var(--cmp-border); }
  .evt-fac { background:var(--fac-border); }
  .evt-sys { background:var(--sys-border); }
  .multi-cat .evt-tag { display:block; margin-top:1px; }

  /* Detail Cards */
  .detail-section { margin-top:8px; }
  .detail-cards { display:flex; flex-wrap:wrap; gap:8px; }
  .detail-card {
    flex:1 1 280px; border-radius:8px; padding:12px 14px;
    border-left:4px solid; font-size:13px;
  }
  .detail-card .dc-date { font-weight:700; font-size:12px; margin-bottom:4px; }
  .detail-card .dc-text { color:#334155; }
  .detail-card .dc-note { color:#64748B; font-size:12px; margin-top:4px; font-style:italic; }
  .dc-ops { background:var(--ops-bg); border-color:var(--ops-border); }
  .dc-act { background:var(--act-bg); border-color:var(--act-border); }
  .dc-cmp { background:var(--cmp-bg); border-color:var(--cmp-border); }
  .dc-fac { background:var(--fac-bg); border-color:var(--fac-border); }
  .dc-sys { background:var(--sys-bg); border-color:var(--sys-border); }

  .range-item { 
    background:white; border:1.5px solid #E2E8F0; border-radius:8px; 
    padding:10px 14px; margin-bottom:8px; display:flex; gap:12px; align-items:center;
  }
  .range-date { font-weight:800; font-size:13px; color:#0F172A; min-width:90px; }
  .range-body { flex:1; }
  .range-body .rb-title { font-weight:700; font-size:13px; }
  .range-body .rb-note { font-size:12px; color:#64748B; }
  .range-tag { font-size:11px; padding:3px 10px; border-radius:12px; font-weight:600; color:white; }

  /* System timeline */
  .sys-timeline { position:relative; padding-left:28px; }
  .sys-timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:3px; background:#DDD6FE; border-radius:2px; }
  .sys-item { position:relative; margin-bottom:14px; }
  .sys-item::before { content:''; position:absolute; left:-24px; top:6px; width:12px; height:12px; border-radius:50%; background:#7C3AED; border:2px solid white; }
  .sys-item .si-time { font-size:12px; font-weight:700; color:#7C3AED; }
  .sys-item .si-title { font-size:14px; font-weight:700; color:#1E293B; }
  .sys-item .si-desc { font-size:13px; color:#475569; margin-top:2px; }

  .empty-cell { background:#F8FAFC; }

  @media (max-width:768px) {
    .cal-grid { grid-template-columns:repeat(7, 1fr); }
    .day-cell { min-height:36px; font-size:9px; }
    .evt-tag { font-size:7px; }
    .detail-card { flex:1 1 100%; }
  }
</style>

// ========== RENDER ==========
function getDayOfWeek(y, m, d) {
  return new Date(y, m-1, d).getDay();
}

function renderCalendar(monthKey) {
  const m = DATA[monthKey];
  const [y, mo] = monthKey.split('-').map(Number);
  const firstDay = getDayOfWeek(y, mo, 1);
  const dayNames = ['日','一','二','三','四','五','六'];

  let html = '<div class="cal-grid">';
  dayNames.forEach(n => { html += `<div class="day-header">${n}</div>`; });

  // Pad
  for (let i = 0; i < firstDay; i++) html += '<div class="day-cell empty-cell"></div>';

  for (let d = 1; d <= m.days; d++) {
    const dow = getDayOfWeek(y, mo, d);
    const isWeekend = dow === 0 || dow === 6;
    const evts = m.events.filter(e => e.d === d);
    const rangeEvts = m.events.filter(e => e.d === null);
    const hasEvt = evts.length > 0;
    const cats = [...new Set(evts.map(e => e.cat))];
    const hidden = (currentCat !== 'all' && currentCat !== 'sys') ? evts.filter(e => e.cat !== currentCat).length === evts.length && evts.length > 0 : false;
    
    let classes = 'day-cell';
    if (isWeekend) classes += ' weekend';
    if (cats.length === 1) classes += ` cat-${cats[0]} has-event`;
    else if (cats.length > 1) classes += ' multi-cat has-event';
    if (hidden) classes += ' empty-cell';

    html += `<div class="${classes}">`;
    html += `<div class="day-num">${d}</div>`;
    evts.filter(e => currentCat === 'all' || e.cat === currentCat).forEach(e => {
      html += `<div class="evt-tag ${CAT_CLASSES[e.cat]}" title="${e.text}">${e.text.length > 5 ? e.text.slice(0,5)+'…' : e.text}</div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // Detail cards
  const filteredEvts = m.events.filter(e => {
    if (e.d === null) return false;
    if (currentCat !== 'all' && currentCat !== 'sys' && e.cat !== currentCat) return false;
    return true;
  });

  if (filteredEvts.length > 0) {
    html += '<div class="detail-section"><div class="detail-cards">';
    filteredEvts.forEach(e => {
      html += `<div class="detail-card ${DC_CLASSES[e.cat]}">
        <div class="dc-date">${mo}月${e.d}日</div>
        <div class="dc-text">${e.text}</div>
        ${e.note ? `<div class="dc-note">${e.note}</div>` : ''}
      </div>`;
    });
    html += '</div></div>';
  }

  // Multi-day / no-date items
  const rangeItems = m.events.filter(e => e.d === null && (currentCat === 'all' || e.cat === currentCat));
  if (rangeItems.length > 0) {
    html += '<div style="margin-top:12px">';
    rangeItems.forEach(e => {
      html += `<div class="range-item">
        <div class="range-date">${m.label}</div>
        <div class="range-body">
          <div class="rb-title">${e.text}</div>
          ${e.note ? `<div class="rb-note">${e.note}</div>` : ''}
        </div>
        <span class="range-tag" style="background:${getComputedStyle(document.documentElement).getPropertyValue('--'+e.cat+'-border')}">${CAT_NAMES[e.cat]}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

function renderSystemTimeline() {
  let html = '<div class="month-header">📋 重要运营制度确立时间线 <span class="badge">时间轴</span></div>';
  html += '<div class="sys-timeline">';
  SYSTEMS.forEach(s => {
    html += `<div class="sys-item">
      <div class="si-time">${s.time}</div>
      <div class="si-title">${s.title}</div>
      <div class="si-desc">${s.desc}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function render() {
  const content = document.getElementById('content');
  let html = '';

  if (currentCat === 'sys') {
    html = renderSystemTimeline();
  } else if (currentCat === 'all') {
    Object.keys(DATA).forEach(key => {
      const m = DATA[key];
      html += `<div class="month-section"><div class="month-header">${m.label} <span class="badge">${m.events.length}项</span></div>`;
      html += renderCalendar(key);
      html += '</div>';
    });
    html += renderSystemTimeline();
  } else {
    Object.keys(DATA).forEach(key => {
      const m = DATA[key];
      const hasCat = m.events.some(e => e.cat === currentCat);
      if (hasCat) {
        html += `<div class="month-section"><div class="month-header">${m.label} <span class="badge">${m.events.filter(e=>e.cat===currentCat).length}项</span></div>`;
        html += renderCalendar(key);
        html += '</div>';
      }
    });
  }

  content.innerHTML = html;
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  render();
}

// Init
render();
</script>
</body>
</html>
